name: 📊 GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0:00 自动更新

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Update README with GitHub Stats
        uses: anuraghazra/github-readme-stats@main
        with:
          show_rank: true
          theme: radical
          commit_message: "📊 Auto-update stats"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          
      - name: Update Top Languages
        uses: anuraghazra/github-readme-stats@main
        with:
          layout: compact
          langs_count: 5
          theme: radical
          commit_message: "📊 Auto-update top languages"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
